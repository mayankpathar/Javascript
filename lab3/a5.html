//Write a JavaScript to take 2-digit number and then separate these 2 digits, then multiply ƒrst digit by itself for second digit times.
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("enter the 2-digit number: "))
        let rev = parseInt(n / 10)
        let rem = n % 10
        let result = 1

        for (let i = 0; i <rem; i++) {
            result *= rev
        }
        document.write("Result: " + result)
    </script>
</body>
</html>
