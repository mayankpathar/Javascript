<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         let a = parseInt(prompt("enter a number1:"))
        let b = parseInt(prompt("enter a number2:"))
        let c = parseInt(prompt("enter a number1:"))
        
        let max = Math.max(a,b,c)
        let min = Math.min(a,b,c)
        let absa = Math.abs(a)
        let absb = Math.abs(b)
        let absc = Math.abs(c)

        document.write(max)
        document.write(min)
        document.write(absa)
        document.write(absb)
        document.write(absc)
    </script>
</body>
</html>
