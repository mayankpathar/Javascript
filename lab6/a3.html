<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let a = parseFloat(prompt("enter a number1:"))
        let b = parseFloat(prompt("enter a number2:"))
        let c = parseFloat(prompt("enter a number3:"))
        let d = parseFloat(prompt("enter a number4:"))
        document.write(Math.floor(a))
        document.write("<br/>")
        document.write(Math.ceil(b))
        document.write("<br/>")
        document.write(Math.round(c))
        document.write("<br/>")
        document.write(Math.trunc(d))

    </script>
</body>

</html>
