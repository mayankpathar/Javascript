<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         let n = parseInt(prompt("enter the num: "))
         let flag = 0
         for (let i = 2;  i< n; i++) {
            if (n%i==0) {
                flag=1
            }
            
         }
         if (flag==0) {
            alert("prime")
         } else {
            alert("not prime")
         }
    </script>
</body>
</html>
