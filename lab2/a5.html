<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("enter the num: "))
        let temp = n
        let rev = 0
        while (temp > 0) {
            let rem = temp % 10
            rev = rev * 10 + rem
            temp = parseInt(temp / 10)
        }
        if (n == rev) {
            alert("palindrome")
        } else {
            alert("not palindrome")
        }
    </script>
</body>
</html>
