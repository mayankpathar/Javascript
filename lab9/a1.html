<!-- WAP to demonstrate callbacks in JavaScript. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        function greet(name, callback) {
            console.log('Hello ' + name);
            callback();
        }

        function sayGoodbye() {
            console.log('Goodbye!');
        }

        greet('Alice', sayGoodbye);
    </script>
 </body>
 </html>
