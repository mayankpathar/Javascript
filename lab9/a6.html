<!-- Demonstrate the Array and Object Destructuring. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        const arr = [1, 2, 3];
        const [a, b, c] = arr;
        console.log(a); 
        console.log(b); 
        console.log(c); 
         const arr1 = [1, 2, 3];
        const [a1, , c1] = arr1;
        console.log(a1); 
        // console.log(b1); 
        console.log(c1); 

        const obj = { name: 'mayank', age: 18 };
        const { name, age } = obj;
        console.log(name); 
        console.log(age);

    </script>
 </body>
 </html>
