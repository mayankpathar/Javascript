<!-- Demonstrate the default parameter while using a function. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>

        function greet(name='om') {
            console.log('Hello ' + name);
        }

        greet();
        greet('mayank');

    </script>
 </body>
 </html>
