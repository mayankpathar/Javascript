<!-- Demonstrate the difference between let and var. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        var a=10;
        
      if(true) {
            var a=20;
            console.log(a);
        }

        console.log(a);
        let b=10;
        if(true) {
            let b=20;
            console.log(b);
        }
        console.log(b);
    </script>
 </body>
 </html>
