<!-- 4. WAP to recognize which form event is ƒired. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form id="myForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <label for="repeatPassword">Repeat Password:</label>
        <input type="password" id="repeatPassword" name="repeatPassword" required><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="enrollment">Enrollment Number:</label>
        <input type="text" id="enrollment" name="enrollment" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <input type="submit" value="Submit">
    </form>

    <script>
        var form = document.getElementById('myForm');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            alert("Form submit event is fired");
        });

        form.addEventListener('reset', function() {
            alert("Form reset event is fired");
        });

        form.addEventListener('change', function() {
            alert("Form change event is fired");
        });

    </script>
</body>
</html>
