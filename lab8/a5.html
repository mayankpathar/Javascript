<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="inp">
    <button id="add" onclick="AddStudent()">Add</button>
    <button id="update" onclick="UpdateStu()">Update</button>
    <table>
        <thead>
            <th>Id</th>
            <th>Name</th>
            <th>Action</th>
        </thead>
        <tbody id="body"></tbody>
    </table>

    <script>
        let arr = []

        function AddStudent(){
            temp = document.getElementById('inp').value
            arr.push(temp)
            Display()
            document.getElementById("inp").value = ""
        }

        function Display(){
            let temp = ''
            for (let index = 0; index < arr.length; index++) {
                temp += `<tr>
                <td>${index+1}</td>
                <td>${arr[index]}</td>
                <td><button onclick="deleteStu(${index})">Delete</button><button onclick="editStu(${index})">Edit</button></td>
                </tr>`
            }

            document.getElementById("body").innerHTML = temp
        }

        function deleteStu(i){
            arr.splice(i,1)
            Display()
        }

        function editStu(i){
            document.getElementById("inp").value = arr[i]
            index = i
        }

        function UpdateStu(){
            arr[index] = document.getElementById("inp").value
            Display()
            document.getElementById("inp").value = ""
        }

        
    </script>
</body>
</html>
