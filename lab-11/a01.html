<body>
    <script>
        class Students {
            constructor(name,age,phoneno) {
                this.name=name;
                this.age=age;
                this.phoneno=phoneno;
            }
            display(){
                console.log("name: ",this.name);
                console.log("age: ",this.age);
                console.log("phoneno: ",this.phoneno);
            }
            
        }
        const Student1 = new Students("mayank","18","9274488638");
        const Student2 = new Students("om","18","99278844639");
        Student1.display();
        Student2.display();
    </script>
</body>
