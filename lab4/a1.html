<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
    let arr = [ ];
    
    let n = parseInt(prompt("enter the number: "))
    for (let i = 0; i < n; i++) {
        arr[i] = parseInt(prompt("enter the arr of element: "))
        
    }
    let max = arr[0];
    for (let i = 1; i < n; i++) {
        if (arr[i] > max) {
            max = arr[i];
        }
    }

    document.write("Maximum number: " + max);
    </script>
</body>

</html>
