<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr = [];
        let n = parseInt(prompt("enter the number: "))
        for (let i = 0; i < n; i++) {
            arr[i] = parseInt(prompt("enter the arr of element: "))
        }
        for (let i = 0; i < n ; i++) {
            for (let j = 0; j < n - 1; j++) {
                if (arr[i] < arr[j]) {
                    let temp = arr[i];
                    arr[i] = arr[j ];
                    arr[j] = temp;
                }
            }
        }
        document.write("Sorted array: " + arr);
    </script>
</body>
</html>
