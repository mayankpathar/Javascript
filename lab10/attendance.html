<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
    <style>
        :root {
            --bg: #f3f6fb;
            --surface: #ffffff;
            --surface-alt: #edf2f7;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #d9e2ec;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 34%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        }

        .container {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
            padding: 2rem 1rem;
        }

        .card {
            border: 1px solid rgba(217, 226, 236, 0.9);
            box-shadow: var(--shadow);
            border-radius: 1rem;
            overflow: hidden;
            background: var(--surface);
        }

        .card-body {
            padding: 1.25rem 1.5rem;
        }

        .card-title {
            margin-bottom: 0.5rem;
            color: var(--muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .card-subtitle {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 0.75rem;
            padding: 0.72rem 1.15rem;
            margin: 0 0.5rem 1rem 0;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
            cursor: pointer;
            transition: transform 140ms ease, background-color 140ms ease, box-shadow 140ms ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(37, 99, 235, 0.22);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        thead {
            background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
        }

        th,
        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        th {
            color: #0f172a;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        tbody tr:nth-child(even) {
            background: var(--surface-alt);
        }

        input[type='checkbox'] {
            width: 1rem;
            height: 1rem;
            accent-color: var(--accent);
            cursor: pointer;
        }

        #result {
            width: 100%;
            min-height: 18rem;
            padding: 1rem 1.1rem;
            
            border: 1px solid var(--border);
            border-radius: 1rem;
            background: var(--surface);
            color: var(--text);
            box-shadow: var(--shadow);
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .result-panel {
            width: 45%;
            float: right;
        }

        .result-title {
            margin: 0 0 0.75rem;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

     
    </style>
</head>

<body>
    <div class="container">
        <div class="card" style="width: 28rem;">
            <div class="card-body">
                <h5 class="card-title">Date</h5>
                <hr>
                <p class="card-subtitle mb-2 text-body-secondary" id="date"></p>
            </div>
        </div>
        <div style="width: 45%; float: left;">
            <button onclick="changeAll(true)">Check</button>
            <button onclick="changeAll(false)">Uncheck</button>
            <br />
            <table>
                <thead>
                    <tr>
                        <th>roll no</th>
                        <th>student name</th>
                        <th>attendance</th>
                    </tr>
                </thead>
                <tbody>

                </tbody>
            </table>
            <script>
                let first = parseInt(prompt("Enter the first roll number"));
                let last = parseInt(prompt("Enter the last roll number"));
                for (i = first; i <= last; i++) {
                    document.write(
                        `<input onclick='changeAbPr()' type='checkbox' value='${i}' /> ${i} <br />`,

                    );
                }
                const today = new Date();
                document.getElementById("date").innerHTML = today.toLocaleDateString();
            </script>
        </div>
        <div class="result-panel">
            <p class="result-title">Absent Students</p>
            <div id="result"></div>
        </div>
    </div>
    <script>

        function changeAll(temp) {
            allStudents = document.getElementsByTagName("input");
            for (i = 0; i < allStudents.length; i++) {
                allStudents[i].checked = temp;
            }
        }
        function changeAbPr() {
            allStudents = document.getElementsByTagName("input");
            absents = [];
            for (i = 0; i < allStudents.length; i++) {
                if (!allStudents[i].checked) {
                    absents.push(allStudents[i].value);
                }
            }
            document.getElementById("result").textContent = absents.join(", ");
        }
    </script>
</body>

</html>
