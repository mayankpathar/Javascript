<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        :root {
            --bg: #f3f6fb;
            --surface: #ffffff;
            --surface-alt: #edf2f7;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --border: #d9e2ec;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 34%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-start;
            padding: 2rem 1rem;
        }

        .card {
            border: 1px solid rgba(217, 226, 236, 0.9);
            box-shadow: var(--shadow);
            border-radius: 1rem;
            overflow: hidden;
            background: var(--surface);
            width: 100%;
        }

        .card-body {
            padding: 1.25rem 1.5rem;
        }

        .card-title {
            margin-bottom: 0.5rem;
            color: var(--muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .card-subtitle {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .setup-panel {
            width: 26rem;
        }

        .setup-panel label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.25rem;
        }

        .setup-panel input[type="number"] {
            width: 100%;
            padding: 0.5rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            margin-bottom: 0.9rem;
        }

        .main-panel {
            flex: 1;
            min-width: 20rem;
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 0.75rem;
            padding: 0.72rem 1.15rem;
            margin: 0 0.5rem 1rem 0;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
            cursor: pointer;
            transition: transform 140ms ease, background-color 140ms ease, box-shadow 140ms ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(37, 99, 235, 0.22);
        }

        button.secondary {
            background: #e2e8f0;
            color: var(--text);
            box-shadow: none;
        }

        button.secondary:hover {
            background: #cbd5e1;
            transform: translateY(-1px);
        }

        button.danger {
            background: var(--danger);
            box-shadow: 0 10px 20px rgba(220, 38, 38, 0.18);
        }

        button.danger:hover {
            background: var(--danger-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        thead {
            background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
        }

        th,
        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        th {
            color: #0f172a;
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        tbody tr:nth-child(even) {
            background: var(--surface-alt);
        }

        tbody tr.absent {
            background: #fef2f2;
        }

        input[type='checkbox'] {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: var(--accent);
            cursor: pointer;
        }

        #result {
            width: 100%;
            min-height: 8rem;
            padding: 1rem 1.1rem;
            border: 1px solid var(--border);
            border-radius: 1rem;
            background: var(--surface);
            color: var(--text);
            box-shadow: var(--shadow);
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        #summary {
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 0.5rem;
        }

        .empty-state {
            color: var(--muted);
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card setup-panel">
            <div class="card-body">
                <h5 class="card-title">Date</h5>
                <p class="card-subtitle mb-3" id="date"></p>

                <h5 class="card-title">Class Setup</h5>
                <label for="firstRoll">First roll number</label>
                <input type="number" id="firstRoll" placeholder="e.g. 1" />
                <label for="lastRoll">Last roll number</label>
                <input type="number" id="lastRoll" placeholder="e.g. 40" />
                <button onclick="generateRoster()">Generate roster</button>
            </div>
        </div>

        <div class="main-panel">
            <button onclick="changeAll(true)">Mark all present</button>
            <button class="secondary" onclick="changeAll(false)">Mark all absent</button>

            <table>
                <thead>
                    <tr>
                        <th style="width: 6rem;">Roll No</th>
                        <th style="width: 8rem;">Present</th>
                    </tr>
                </thead>
                <tbody id="rosterBody">
                    <tr>
                        <td colspan="2" class="empty-state">Enter a roll number range and click "Generate roster" to begin.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card" style="width: 100%;">
            <div class="card-body">
                <p class="card-title mb-2">Absent Students</p>
                <div id="result">No students marked absent yet.</div>
                <div id="summary"></div>
            </div>
        </div>
    </div>

    <script>
        const today = new Date();
        document.getElementById("date").textContent = today.toLocaleDateString();

        function generateRoster() {
            const first = parseInt(document.getElementById("firstRoll").value, 10);
            const last = parseInt(document.getElementById("lastRoll").value, 10);
            const tbody = document.getElementById("rosterBody");

            if (isNaN(first) || isNaN(last) || first > last) {
                alert("Please enter a valid roll number range (first ≤ last).");
                return;
            }

            tbody.innerHTML = "";
            for (let roll = first; roll <= last; roll++) {
                const row = document.createElement("tr");
                row.dataset.roll = roll;

                const rollCell = document.createElement("td");
                rollCell.textContent = roll;

                const presentCell = document.createElement("td");
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = true;
                checkbox.value = roll;
                checkbox.addEventListener("change", () => updateResult(row, checkbox.checked));
                presentCell.appendChild(checkbox);

                row.appendChild(rollCell);
                row.appendChild(presentCell);
                tbody.appendChild(row);
            }
            updateResult();
        }

        function changeAll(present) {
            const checkboxes = document.querySelectorAll('#rosterBody input[type="checkbox"]');
            checkboxes.forEach((cb) => {
                cb.checked = present;
                cb.closest("tr").classList.toggle("absent", !present);
            });
            updateResult();
        }

        function updateResult(changedRow, isChecked) {
            if (changedRow) {
                changedRow.classList.toggle("absent", !isChecked);
            }

            const rows = document.querySelectorAll("#rosterBody tr[data-roll]");
            const absentees = [];
            rows.forEach((row) => {
                const checkbox = row.querySelector('input[type="checkbox"]');
                if (checkbox && !checkbox.checked) {
                    absentees.push(checkbox.value);
                }
            });

            const resultEl = document.getElementById("result");
            resultEl.textContent = absentees.length ? absentees.join(", ") : "No students marked absent.";

            const total = rows.length;
            document.getElementById("summary").textContent = total
                ? `Present: ${total - absentees.length} / ${total}   ·   Absent: ${absentees.length} / ${total}`
                : "";
        }
    </script>
</body>

</html>
